apiVersion: apps/v1
kind: Deployment
metadata:
  name: pacientes
  namespace: healthcare
  labels:
    app: pacientes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pacientes
  template:
    metadata:
      labels:
        app: pacientes
    spec:
      initContainers:
        - name: wait-for-infra
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-service 5432; do echo "aguardando postgres..."; sleep 3; done
              until nc -z rabbitmq-service 5672; do echo "aguardando rabbitmq..."; sleep 3; done
              until nc -z redis-service 6379; do echo "aguardando redis..."; sleep 3; done
      containers:
        - name: pacientes
          image: healthcare-api-pacientes:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: healthcare-config
            - secretRef:
                name: healthcare-secrets
          env:
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: healthcare-config
                  key: DB_NAME_PACIENTES
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 90
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 10
          resources:
            requests:
              memory: 512Mi
              cpu: 200m
            limits:
              memory: 768Mi
              cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: pacientes-service
  namespace: healthcare
spec:
  selector:
    app: pacientes
  ports:
    - port: 8081
      targetPort: 8081
