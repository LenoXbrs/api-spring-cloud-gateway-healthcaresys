apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: healthcare
  labels:
    app: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      initContainers:
        - name: wait-for-apps
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z pacientes-service 8081; do echo "aguardando pacientes..."; sleep 3; done
              until nc -z usuarios-service 8082; do echo "aguardando usuarios..."; sleep 3; done
              until nc -z triagem-service 8083; do echo "aguardando triagem..."; sleep 3; done
      containers:
        - name: gateway
          image: healthcare-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: healthcare-config
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: 384Mi
              cpu: 150m
            limits:
              memory: 512Mi
              cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: healthcare
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080
