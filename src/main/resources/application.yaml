spring:
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: rota-pacientes
              uri: http://api-pacientes:8081
              predicates:
                - Path=/pacientes/**

            - id: rota-usuarios
              uri: http://api-usuarios:8082
              predicates:
                - Path=/usuarios/**

            - id: rota-triagem
              uri: http://api-triagem:8083
              predicates:
                - Path=/triagem/**


server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health


